server:
  port: 9998 #tomcat端口
  servlet:
    context-path: /platform
spring:
  application:
    name: zen-ops-server
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver #数据库驱动
    url: jdbc:mysql://localhost:3306/zen_ops?useUnicode=true&characterEncoding=utf8&autoReconnect=true&serverTimezone=GMT%2b8&useSSL=false #公司虚拟机IP
    username: root
    password: 123456
#      文件上传大小限制
  servlet:
    multipart:
      max-file-size: -1
      max-request-size: -1
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
mybatis-plus:
  type-aliases-package: com.ops.zen.entity
  type-handlers-package: com.ops.zen.config
  mapper-locations: classpath*:mapper/*Mapper.xml,classpath:mapper/custom/*Mapper.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 注册自定义 TypeHandler
    type-handlers-package: com.ops.zen.config
logging:
  config: classpath:logback.xml
  level:
    root: info
zen:
  user:
    default-password: admin123
  tags: 测试:warning,生产:primary,预发:info,高危:danger,内网:success
  app:
    title: ZenOps
    subtitle: 一站式运维平台
    browser-title: ZenOps一站式运维平台
